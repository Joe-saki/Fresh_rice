$kind: http-request
method: POST
url: '{{baseUrl}}/api/students/rewards/redeem'
order: 3000
description: Redeem reward points (Student only)
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "points": 100
    }
