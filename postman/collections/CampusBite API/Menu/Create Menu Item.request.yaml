$kind: http-request
method: POST
url: '{{baseUrl}}/api/menu'
order: 2000
description: Create a new menu item (Vendor only)
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Jollof Rice",
      "description": "Delicious spiced rice with tomato sauce",
      "price": 25.00,
      "category": "MAIN",
      "image": "https://example.com/jollof.jpg",
      "available": true
    }
