$kind: http-request
method: PATCH
url: '{{baseUrl}}/api/admin/vendors/{{vendorId}}/verify'
order: 2000
description: Verify a vendor account (Admin only)
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "verified": true
    }
